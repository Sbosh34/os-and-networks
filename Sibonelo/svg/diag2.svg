<svg width="720" height="180" viewBox="0 0 720 180" xmlns="http://www.w3.org/2000/svg"> <rect x="70" y="40" width="160" height="60" fill="white" stroke="black"/> <text x="150" y="65" text-anchor="middle" font-size="14">Link header</text> <text x="150" y="85" text-anchor="middle" font-size="12">MAC src/dest</text> <rect x="230" y="40" width="300" height="60" fill="white" stroke="black"/> <text x="380" y="65" text-anchor="middle" font-size="14">Network-layer datagram</text> <text x="380" y="85" text-anchor="middle" font-size="12">IP src/dest + transport segment</text> <rect x="530" y="40" width="120" height="60" fill="white" stroke="black"/> <text x="590" y="65" text-anchor="middle" font-size="14">Trailer</text> <text x="590" y="85" text-anchor="middle" font-size="12">Error check</text> <text x="360" y="135" text-anchor="middle" font-size="15"> The frame is used only across one link, then removed at the next node. </text> </svg>
