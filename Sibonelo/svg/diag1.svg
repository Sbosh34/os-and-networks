<svg width="720" height="250" viewBox="0 0 720 250" xmlns="http://www.w3.org/2000/svg"> <defs> <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"> <path d="M0,0 L0,6 L9,3 z" fill="black"/> </marker> </defs> <rect x="30" y="40" width="110" height="50" rx="8" fill="white" stroke="black"/> <text x="85" y="70" text-anchor="middle" font-size="14">Host A</text> <rect x="210" y="40" width="110" height="50" rx="8" fill="white" stroke="black"/> <text x="265" y="70" text-anchor="middle" font-size="14">Router R1</text> <rect x="390" y="40" width="110" height="50" rx="8" fill="white" stroke="black"/> <text x="445" y="70" text-anchor="middle" font-size="14">Router R2</text> <rect x="570" y="40" width="110" height="50" rx="8" fill="white" stroke="black"/> <text x="625" y="70" text-anchor="middle" font-size="14">Host B</text> <line x1="140" y1="65" x2="210" y2="65" stroke="black" stroke-width="2" marker-end="url(#arrow)"/> <line x1="320" y1="65" x2="390" y2="65" stroke="black" stroke-width="2" marker-end="url(#arrow)"/> <line x1="500" y1="65" x2="570" y2="65" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>

<text x="175" y="35" text-anchor="middle" font-size="13">Link 1: WiFi frame</text>
<text x="355" y="35" text-anchor="middle" font-size="13">Link 2: Ethernet frame</text>
<text x="535" y="35" text-anchor="middle" font-size="13">Link 3: fibre frame</text>

<rect x="70" y="135" width="580" height="45" rx="8" fill="white" stroke="black" stroke-dasharray="6 4"/> <text x="360" y="163" text-anchor="middle" font-size="15">Same IP datagram: source IP = A, destination IP = B</text> <text x="360" y="215" text-anchor="middle" font-size="14"> Frames change at each hop; the IP datagram continues toward the final destination. </text> </svg>
